name: Cursor Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

permissions:
  contents: write
  issues: read
  pull-requests: write

jobs:
  fix-issue:
    name: Fix cursor-agent issue
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'cursor-agent')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create automation branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          ISSUE_NUMBER="${{ github.event.issue.number || inputs.issue_number }}"
          BRANCH="cursor-agent/issue-${ISSUE_NUMBER}-${GITHUB_RUN_ID}"
          git switch -c "$BRANCH"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install automation dependencies
        run: npm ci

      - name: Set up Python for optional validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight pytest validation dependencies
        id: pytest_deps
        shell: bash
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Write local automation environment
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "CURSOR_API_KEY=${{ secrets.CURSOR_API_KEY }}"
            echo "MATERIALSCOPE_PYTEST_OPTIONAL=${{ steps.pytest_deps.outcome == 'success' }}"
          } > .env

      - name: Run Cursor issue fixer
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.branch.outputs.issue_number }}
        run: npm run cursor:fix-issue

      - name: Run optional pytest smoke validation
        if: steps.pytest_deps.outcome == 'success'
        shell: bash
        continue-on-error: true
        run: |
          if python - <<'PY'
          import importlib.util
          raise SystemExit(0 if importlib.util.find_spec("pytest") else 1)
          PY
          then
            pytest
          else
            echo "pytest is unavailable; skipping optional validation."
          fi

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes produced by Cursor agent."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix issue #${{ steps.branch.outputs.issue_number }} with Cursor agent"

      - name: Push automation branch
        if: steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push --set-upstream origin "${{ steps.branch.outputs.branch }}"

      - name: Open draft pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh pr create \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "Cursor agent fix for issue #${{ steps.branch.outputs.issue_number }}" \
            --body "Draft PR generated by Cursor SDK automation for issue #${{ steps.branch.outputs.issue_number }}.

          Safety notes:
          - This workflow never merges automatically.
          - This workflow pushes only to \`${{ steps.branch.outputs.branch }}\`, not to the default branch.
          - Full Python dependency installation is intentionally skipped in the initial scaffold.
          - Pytest is best-effort and may be skipped or fail if optional scientific dependencies are unavailable."
